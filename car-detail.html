<!DOCTYPE html>
<html lang="en" id="root">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Car Details – CarsForRent.com</title>
  <link rel="shortcut icon" href="image/car_rental_logo.jpeg" type="image/x-icon">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #121212;
      --card-bg: #1a1a1a;
      --text: #e0e0e0;
      --text-secondary: #aaaaaa;
      --accent: #0066b1;
      --border: rgba(255,255,255,0.08);
      --shadow: rgba(0,0,0,0.5);
      --nav-height: 70px;
    }

    .light-mode {
      --bg: #dbdde0;
      --surface: #ffffff;
      --card-bg: #f1f3f5;
      --text: #212529;
      --text-secondary: #495057;
      --accent: #0066b1;
      --border: rgba(0,0,0,0.1);
      --shadow: rgba(0,0,0,0.1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      transition: background-color 0.4s, color 0.4s;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.7;
      overflow-x: hidden;
    }
    nav {
      position: fixed;
      top: 0;
      width: 100%;
      height: var(--nav-height);
      background: var(--surface);
      padding: 0 5%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 1000;
      box-shadow: 0 2px 10px var(--shadow);
    }
    .nav-left {
      display: flex;
      align-items: center;
      gap: 1.2rem;
    }
    .back-btn {
      background: none;
      border: none;
      color: var(--text);
      font-size: 1.3rem;
      cursor: pointer;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s, color 0.3s;
    }
    .back-btn:hover {
      background: var(--border);
      color: var(--accent);
    }
    .logo {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--accent);
      text-decoration: none;
      white-space: nowrap;
    }
    .nav-right {
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }
    .mode-toggle {
      background: none;
      border: none;
      color: var(--text);
      font-size: 1.3rem;
      cursor: pointer;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s;
    }
    .mode-toggle:hover {
      background: var(--border);
    }
    .navtog {
      display: none;
      background: none;
      border: none;
      color: var(--text);
      font-size: 1.5rem;
      cursor: pointer;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      align-items: center;
      justify-content: center;
      transition: background 0.3s;
    }

    .navtog:hover {
      background: var(--border);
    }
    .mobile-menu {
      display: none;
      position: fixed;
      top: var(--nav-height);
      left: 0;
      width: 100%;
      background: var(--surface);
      box-shadow: 0 4px 15px var(--shadow);
      z-index: 999;
      padding: 1rem 0;
      transform: translateY(-100%);
      opacity: 0;
      transition: transform 0.3s ease, opacity 0.3s ease;
    }
    .mobile-menu.active {
      transform: translateY(0);
      opacity: 1;
    }
    .mobile-menu ul {
      list-style: none;
      padding: 0;
    }
    .mobile-menu ul li {
      border-bottom: 1px solid var(--border);
    }
    .mobile-menu ul li:last-child {
      border-bottom: none;
    }
    .mobile-menu ul li a {
      display: block;
      padding: 1rem 5%;
      color: var(--text);
      text-decoration: none;
      font-weight: 500;
      transition: background 0.3s, color 0.3s;
    }
    .mobile-menu ul li a:hover {
      background: var(--border);
      color: var(--accent);
    }
    main {
      margin-top: calc(var(--nav-height) + 20px);
      padding: 2rem 5%;
      display: flex;
      flex-wrap: wrap;
      gap: 2rem;
      max-width: 1400px;
      margin-left: auto;
      margin-right: auto;
      min-height: calc(100vh - var(--nav-height));
    }
    .car-preview {
      flex: 1;
      min-width: 300px;
      text-align: center;
    }
    .car-image {
      width: 100%;
      max-width: 500px;
      background: var(--card-bg);
      padding: 1.5rem;
      border-radius: 12px;
      margin: 0 auto;
      border: 1px solid var(--border);
    }
    .car-info {
      flex: 1;
      min-width: 300px;
    }
    .car-info h1 {
      color: var(--text);
      margin-bottom: 0.5rem;
      font-size: 2.2rem;
      line-height: 1.2;
    }
    .brand {
      color: var(--accent);
      margin-bottom: 1.5rem;
      font-size: 1.1rem;
      font-weight: 500;
    }
    .price {
      font-size: 2rem;
      color: var(--accent);
      font-weight: bold;
      margin: 1.5rem 0;
    }
    .specs {
      margin: 2rem 0;
      background: var(--card-bg);
      padding: 1.5rem;
      border-radius: 10px;
      border: 1px solid var(--border);
    }
    .spec {
      display: flex;
      justify-content: space-between;
      padding: 0.8rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 1rem;
    }
    .spec:last-child {
      border-bottom: none;
    }
    .spec span:first-child {
      color: var(--text-secondary);
      font-weight: 500;
    }
    .spec span:last-child {
      color: var(--text);
      font-weight: 600;
    }
    .color-options {
      margin: 2rem 0;
    }
    .color-options h3 {
      margin-bottom: 1rem;
      color: var(--text);
      font-size: 1.2rem;
    }
    .colors {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
    }
    .color-swatch {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      cursor: pointer;
      border: 3px solid transparent;
      transition: all 0.3s ease;
      box-shadow: 0 2px 8px var(--shadow);
    }
    .color-swatch:hover {
      transform: scale(1.1);
    }
    .color-swatch.active {
      border-color: var(--accent);
      transform: scale(1.1);
    }
    .reservenowbtn {
      display: inline-block;
      background: var(--accent);
      color: white;
      padding: 1rem 2.5rem;
      text-decoration: none;
      border-radius: 6px;
      font-weight: 600;
      margin-top: 2rem;
      transition: all 0.3s ease;
      font-size: 1.05rem;
    }
    .reservenowbtn:hover {
      background: #005599;
      transform: translateY(-2px);
      box-shadow: 0 6px 15px rgba(0,102,177,0.4);
    }
    @media (max-width: 992px) {
      .logo {
        font-size: 1.4rem;
      }
      .nav-left {
        gap: 1rem;
      }
      main {
        padding: 1.8rem 4%;
        gap: 1.8rem;
      }
      .car-info h1 {
        font-size: 1.9rem;
      }
      .price {
        font-size: 1.8rem;
      }
      .specs {
        padding: 1.2rem;
      }
      .spec {
        font-size: 0.95rem;
      }
      .car-image {
        max-width: 450px;
        padding: 1.2rem;
      }
    }
    @media (max-width: 768px) {
      :root {
        --nav-height: 60px;
      }
      .logo {
        font-size: 1.25rem;
      }
      .nav-left {
        gap: 0.8rem;
      }
      .back-btn {
        width: 36px;
        height: 36px;
        font-size: 1.1rem;
      }
      .mode-toggle {
        width: 36px;
        height: 36px;
        font-size: 1.1rem;
      }
      .navtog {
        display: flex;
      }
      .mobile-menu {
        display: block;
      }
      main {
        flex-direction: column;
        padding: 1.5rem 4%;
        gap: 1.5rem;
        margin-top: calc(var(--nav-height) + 15px);
      }
      .car-preview {
        min-width: 100%;
      }
      .car-info {
        min-width: 100%;
      }
      .car-info h1 {
        font-size: 1.7rem;
      }
      .brand {
        font-size: 1rem;
        margin-bottom: 1.2rem;
      }
      .price {
        font-size: 1.6rem;
        margin: 1.2rem 0;
      }
      .specs {
        margin: 1.5rem 0;
        padding: 1rem;
      }
      .spec {
        padding: 0.7rem 0;
        font-size: 0.95rem;
      }
      .color-options {
        margin: 1.5rem 0;
      }
      .color-options h3 {
        font-size: 1.1rem;
      }
      .color-swatch {
        width: 40px;
        height: 40px;
      }
      .reservenowbtn {
        padding: 0.9rem 2rem;
        font-size: 1rem;
        width: 100%;
        text-align: center;
      }
      .car-image {
        max-width: 100%;
        padding: 1rem;
      }
    }
    @media (max-width: 480px) {
      .logo {
        font-size: 1.1rem;
      }
      main {
        padding: 1.2rem 3%;
        margin-top: calc(var(--nav-height) + 10px);
      }
      .car-info h1 {
        font-size: 1.5rem;
      }
      .brand {
        font-size: 0.95rem;
      }
      .price {
        font-size: 1.4rem;
      }
      .specs {
        padding: 0.9rem;
      }
      .spec {
        padding: 0.6rem 0;
        font-size: 0.9rem;
      }
      .color-options h3 {
        font-size: 1rem;
      }
      .color-swatch {
        width: 38px;
        height: 38px;
      }
      .reservenowbtn {
        padding: 0.85rem 1.8rem;
        font-size: 0.95rem;
      }
      .car-image {
        padding: 0.8rem;
      }
    }
    @media (max-width: 360px) {
      .logo {
        font-size: 1rem;
      }
      .car-info h1 {
        font-size: 1.35rem;
      }
      .price {
        font-size: 1.3rem;
      }
      .spec {
        font-size: 0.85rem;
      }
      .color-swatch {
        width: 35px;
        height: 35px;
      }
      .reservenowbtn {
        padding: 0.8rem 1.5rem;
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>
  <nav>
    <div class="nav-left">
      <button class="back-btn" onclick="window.history.back()" aria-label="Go back">
        <i class="fas fa-arrow-left"></i>
      </button>
      <a href="index.html" class="logo">CarsForRent<span style="color:var(--text-secondary)">.com</span></a>
    </div>
    <div class="nav-right">
      <button id="darkmode" class="mode-toggle" aria-label="Toggle theme">
        <i class="fas fa-moon"></i>
      </button>
      <button class="navtog" id="navtog" aria-label="Menu">
        <i class="fas fa-bars"></i>
      </button>
    </div>
  </nav>
  <div class="mobile-menu" id="mobileMenu">
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="cars.html">Cars</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </div>
  <main>
    <div class="car-preview">
      <img id="carImg" class="car-image" src="" alt="Car">
    </div>
    <div class="car-info">
      <h1 id="modelName">Loading...</h1>
      <div class="brand" id="brandName"></div>
      <div class="price" id="price"></div>
      <div class="specs">
        <div class="spec"><span>Engine</span> <span id="engine">—</span></div>
        <div class="spec"><span>Horsepower</span> <span id="hp">—</span></div>
        <div class="spec"><span>0-100 km/h</span> <span id="accel">—</span></div>
        <div class="spec"><span>Transmission</span> <span id="trans">—</span></div>
      </div>
      <div class="color-options">
        <h3>Choose Exterior Color</h3>
        <div class="colors" id="choosecolors"></div>
      </div>
      <a href="#" id="reservebtn" class="reservenowbtn" aria-label="reserve now">Reserve Now</a>
    </div>
  </main>
  <script src="darkmode.js"></script>
  <script>
    const cars = {
      mercedes: {
        cla: {
          name: "Mercedes-Benz CLA 250",
          brand: "Mercedes-Benz",
          price: "$129/day",
          engine: "2.0L Turbo I4",
          hp: "221 HP",
          accel: "6.9 sec",
          trans: "9G-Tronic Automatic",
          colors: [
            { name: "Obsidian Black", code: "#0a0a0a", img: "image/CLA-250-BLACK.png" },
            { name: "Polar White", code: "#ffffff", img: "image/CLA-250-WHITE.png" },
            { name: "Selenite Grey", code: "#7a7a7a", img: "image/CLA-250-GREY.png" }
          ]
        }
      },
      bmw: {
        x6: {
          name: "BMW X6 M50i",
          brand: "BMW",
          price: "$249/day",
          engine: "4.4L V8 Twin-Turbo",
          hp: "523 HP",
          accel: "4.1 sec",
          trans: "8-Speed Automatic",
          colors: [
            { name: "Carbon Black", code: "#0b0b0b", img: "image/X6.png" },
            { name: "Mineral White", code: "#f5f5f5", img: "image/X6-white.png" }
          ]
        }
      },
      audi: {
        q8: {
          name: "Audi Q8 Prestige",
          brand: "Audi",
          price: "$189/day",
          engine: "3.0L Turbo V6 + Mild Hybrid",
          hp: "335 HP",
          accel: "5.6 sec",
          trans: "8-Speed Tiptronic",
          colors: [
            { name: "Samurai Gray", code: "#6e6e6e", img: "image/Q8-grey.png" },
            { name: "Glacier White", code: "#ffffff", img: "image/Q8-white.png" },
            { name: "Orca Black", code: "#0d0d0d", img: "image/Q8-black.png" },
            { name: "Navarra Blue", code: "#1f3c70", img: "image/Q8-blue.png" }
          ]
        }
      },
      porsche: {
        '911': {
          name: "Porsche 911 GT3",
          brand: "Porsche",
          price: "$499/day",
          engine: "4.0L Flat-6 Naturally Aspirated",
          hp: "502 HP",
          accel: "3.2 sec",
          trans: "7-Speed PDK",
          colors: [
            { name: "GT Silver", code: "#c0c0c0", img: "image/GT3.png" }
          ]
        }
      },
      lexus: {
        lx: {
          name: "Lexus LX 600",
          brand: "Lexus",
          price: "$219/day",
          engine: "3.5L Twin-Turbo V6",
          hp: "409 HP",
          accel: "6.5 sec",
          trans: "10-Speed Automatic",
          colors: [
            { name: "Blizzard Pearl", code: "#ffffff", img: "image/LX600-white.png" },
            { name: "Caviar", code: "#0c0c0c", img: "image/LX600-black.png" },
            { name: "Urban Khaki", code: "#7d7f7f", img: "image/LX600-urban.png" },
            { name: "Nori Green", code: "#2e3a2f", img: "image/LX600-green.png" }
          ]
        }
      },
      jaguar: {
        ftype: {
          name: "Jaguar F-Type R",
          brand: "Jaguar",
          price: "$199/day",
          engine: "5.0L Supercharged V8",
          hp: "575 HP",
          accel: "3.5 sec",
          trans: "8-Speed Automatic",
          colors: [
            { name: "Firenze Red", code: "#8b0000", img: "image/F-TYPE-red.png" },
            { name: "Yulong White", code: "#f8f8f8", img: "image/F-TYPE-white.png" }
          ]
        }
      }
    };
    let defselclr = 0; // selected color by default = 0 
    const cardetails = new URLSearchParams(window.location.search);
    const brandKey = cardetails.get('brand');
    const modelKey = cardetails.get('model');
    if (cars[brandKey] && cars[brandKey][modelKey]) {
      const car = cars[brandKey][modelKey];
      document.getElementById('modelName').textContent = car.name;
      document.getElementById('brandName').textContent = car.brand;
      document.getElementById('price').textContent = car.price;
      document.getElementById('engine').textContent = car.engine;
      document.getElementById('hp').textContent = car.hp;
      document.getElementById('accel').textContent = car.accel;
      document.getElementById('trans').textContent = car.trans;
      const img = document.getElementById('carImg');
      const choseclr = document.getElementById('choosecolors');
      img.src = car.colors[0].img;
      defselclr = 0;
      car.colors.forEach((color, i) => {
        const swatch = document.createElement('div');
        swatch.className = 'color-swatch';
        swatch.style.backgroundColor = color.code;
        swatch.title = color.name;
        if (i === 0) swatch.classList.add('active');        swatch.onclick = () => {
          document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
          swatch.classList.add('active');
          img.src = color.img;
          defselclr = i;
        };
        choseclr.appendChild(swatch);
      });
      const resbtn = document.getElementById('reservebtn');
      resbtn.addEventListener('click', (e) => {
        e.preventDefault();
        const url = `reserve.html?brand=${brandKey}&model=${modelKey}&color=${defselclr}`;
        window.location.href = url;
      });
    } else {
      document.querySelector('main').innerHTML = `
        <div style="color:var(--text); text-align:center; margin:100px auto; max-width:600px; padding:2rem;">
          <h2 style="margin-bottom:1rem;">Car Not Found</h2>
          <p style="margin-bottom:1.5rem;">We couldn't find the requested vehicle. Please return to the fleet.</p>
          <a href="cars.html" class="reservenowbtn" style="display:inline-block;">← Back to Fleet</a>
        </div>
      `;
    }
  </script>
</body>
</html>
