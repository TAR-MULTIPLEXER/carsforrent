<!DOCTYPE html>
<html lang="en" id="htmlRoot">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Car Details – CarsForRent.com</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #121212;
      --card-bg: #1a1a1a;
      --text: #e0e0e0;
      --text-secondary: #aaaaaa;
      --accent: #0066b1;
      --border: rgba(255,255,255,0.08);
      --shadow: rgba(0,0,0,0.5);
    }

    .light-theme {
      --bg: #dbdde0;
      --surface: #ffffff;
      --card-bg: #f1f3f5;
      --text: #212529;
      --text-secondary: #495057;
      --accent: #0066b1;
      --border: rgba(0,0,0,0.1);
      --shadow: rgba(0,0,0,0.1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      transition: background-color 0.4s, color 0.4s;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
    }

    nav {
      position: fixed;
      top: 0;
      width: 100%;
      background: var(--surface);
      padding: 1rem 5%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 1000;
      box-shadow: 0 2px 10px var(--shadow);
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 1.2rem;
    }

    .back-btn {
      background: none;
      border: none;
      color: var(--text);
      font-size: 1.4rem;
      cursor: pointer;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s;
    }

    .back-btn:hover {
      background: var(--border);
      color: var(--accent);
    }

    .logo {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--accent);
      text-decoration: none;
    }

    .theme-toggle {
      background: none;
      border: none;
      color: var(--text);
      font-size: 1.4rem;
      cursor: pointer;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .theme-toggle:hover {
      background: var(--border);
    }

    main {
      margin-top: 90px;
      padding: 2rem 5%;
      display: flex;
      flex-wrap: wrap;
      gap: 2rem;
    }

    .car-preview {
      flex: 1;
      min-width: 300px;
      text-align: center;
    }

    .car-image {
      width: 100%;
      max-width: 500px;
      background: var(--bg);
      padding: 1rem;
      border-radius: 8px;
      margin: 0 auto;
    }

    .car-info {
      flex: 1;
      min-width: 300px;
    }

    .car-info h1 {
      color: var(--text);
      margin-bottom: 0.5rem;
    }

    .brand {
      color: var(--accent);
      margin-bottom: 1.5rem;
      font-size: 1.1rem;
    }

    .specs {
      margin: 1.5rem 0;
    }

    .spec {
      display: flex;
      justify-content: space-between;
      padding: 0.6rem 0;
      border-bottom: 1px solid var(--border);
    }

    .color-options h3 {
      margin-bottom: 1rem;
      color: var(--text);
    }

    .colors {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
    }

    .color-swatch {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
    }

    .color-swatch.active {
      border-color: var(--text);
    }

    .btn {
      display: inline-block;
      background: var(--accent);
      color: white;
      padding: 0.9rem 2rem;
      text-decoration: none;
      border-radius: 4px;
      font-weight: 600;
      margin-top: 1.5rem;
      transition: background 0.3s;
    }

    .btn:hover {
      background: #005599;
    }

    .price {
      font-size: 1.8rem;
      color: var(--accent);
      font-weight: bold;
      margin: 1rem 0;
    }

    @media (max-width: 768px) {
      .nav-left { gap: 0.8rem; }
      main { flex-direction: column; }
    }
  </style>
</head>
<body>

  <nav>
    <div class="nav-left">
      <button class="back-btn" onclick="window.history.back()">
        <i class="fas fa-arrow-left"></i>
      </button>
      <a href="index.html" class="logo">CarsForRent<span style="color:var(--text-secondary)">.com</span></a>
    </div>
    <button id="themeToggle" class="theme-toggle">
      <i class="fas fa-moon"></i>
    </button>
  </nav>

  <main>
    <div class="car-preview">
      <img id="carImg" class="car-image" src="" alt="Car">
    </div>

    <div class="car-info">
      <h1 id="modelName">Loading...</h1>
      <div class="brand" id="brandName"></div>
      <div class="price" id="price"></div>

      <div class="specs">
        <div class="spec"><span>Engine</span> <span id="engine">—</span></div>
        <div class="spec"><span>Horsepower</span> <span id="hp">—</span></div>
        <div class="spec"><span>0-100 km/h</span> <span id="accel">—</span></div>
        <div class="spec"><span>Transmission</span> <span id="trans">—</span></div>
      </div>

      <div class="color-options">
        <h3>Choose Exterior Color</h3>
        <div class="colors" id="colorSwatches"></div>
      </div>

      <a href="#" id="reserveBtn" class="btn">Reserve Now</a>
    </div>
  </main>

  <script>
    // Theme toggle
    const html = document.getElementById('htmlRoot');
    const toggleBtn = document.getElementById('themeToggle');
    const icon = toggleBtn.querySelector('i');

    const savedTheme = localStorage.getItem('theme') || 'dark';
    if (savedTheme === 'light') {
      html.classList.add('light-theme');
      icon.className = 'fas fa-sun';
    }

    toggleBtn.addEventListener('click', () => {
      html.classList.toggle('light-theme');
      const isLight = html.classList.contains('light-theme');
      localStorage.setItem('theme', isLight ? 'light' : 'dark');
      icon.className = isLight ? 'fas fa-sun' : 'fas fa-moon';
    });

    // Car data
    const cars = {
      mercedes: {
        cla: {
          name: "Mercedes-Benz CLA 250",
          brand: "Mercedes-Benz",
          price: "$129/day",
          engine: "2.0L Turbo I4",
          hp: "221 HP",
          accel: "6.9 sec",
          trans: "9G-Tronic Automatic",
          colors: [
            { name: "Obsidian Black", code: "#0a0a0a", img: "image/CLA-250-BLACK.png" },
            { name: "Polar White", code: "#ffffff", img: "image/CLA-250-white.png" },
            { name: "Selenite Grey", code: "#7a7a7a", img: "image/CLA-250-grey.png" }
          ]
        }
      },
      bmw: {
        x6: {
          name: "BMW X6 M50i",
          brand: "BMW",
          price: "$249/day",
          engine: "4.4L V8 Twin-Turbo",
          hp: "523 HP",
          accel: "4.1 sec",
          trans: "8-Speed Automatic",
          colors: [
            { name: "Carbon Black", code: "#0b0b0b", img: "image/X6.png" },
            { name: "Mineral White", code: "#f5f5f5", img: "image/X6-white.png" }
          ]
        }
      },
      audi: {
        q8: {
          name: "Audi Q8 Prestige",
          brand: "Audi",
          price: "$189/day",
          engine: "3.0L Turbo V6 + Mild Hybrid",
          hp: "335 HP",
          accel: "5.6 sec",
          trans: "8-Speed Tiptronic",
          colors: [
            { name: "Samurai Gray", code: "#6e6e6e", img: "image/Q8-grey.png" },
            { name: "Glacier White", code: "#ffffff", img: "image/Q8-white.png" },
            { name: "Orca Black", code: "#0d0d0d", img: "image/Q8-black.png" },
            { name: "Navarra Blue", code: "#1f3c70", img: "image/Q8-blue.png" }
          ]
        }
      },
      porsche: {
        '911': {
          name: "Porsche 911 GT3",
          brand: "Porsche",
          price: "$499/day",
          engine: "4.0L Flat-6 Naturally Aspirated",
          hp: "502 HP",
          accel: "3.2 sec",
          trans: "7-Speed PDK",
          colors: [
            { name: "GT Silver", code: "#c0c0c0", img: "image/GT3.png" }
          ]
        }
      },
      lexus: {
        lx: {
          name: "Lexus LX 600",
          brand: "Lexus",
          price: "$219/day",
          engine: "3.5L Twin-Turbo V6",
          hp: "409 HP",
          accel: "6.5 sec",
          trans: "10-Speed Automatic",
          colors: [
            { name: "Blizzard Pearl", code: "#ffffff", img: "image/LX600-white.png" },
            { name: "Caviar", code: "#0c0c0c", img: "image/LX600-black.png" },
            { name: "Urban Khaki", code: "#7d7f7f", img: "image/LX600-urban.png" },
            { name: "Nori Green", code: "#2e3a2f", img: "image/LX600-green.png" }
          ]
        }
      },
      jaguar: {
        ftype: {
          name: "Jaguar F-Type R",
          brand: "Jaguar",
          price: "$199/day",
          engine: "5.0L Supercharged V8",
          hp: "575 HP",
          accel: "3.5 sec",
          trans: "8-Speed Automatic",
          colors: [
            { name: "Firenze Red", code: "#8b0000", img: "image/F-TYPE-red.png" },
            { name: "Yulong White", code: "#f8f8f8", img: "image/F-TYPE-white.png" }
          ]
        }
      }
    };

    let selectedColorIndex = 0;

    const urlParams = new URLSearchParams(window.location.search);
    const brandKey = urlParams.get('brand');
    const modelKey = urlParams.get('model');

    if (cars[brandKey] && cars[brandKey][modelKey]) {
      const car = cars[brandKey][modelKey];
      document.getElementById('modelName').textContent = car.name;
      document.getElementById('brandName').textContent = car.brand;
      document.getElementById('price').textContent = car.price;
      document.getElementById('engine').textContent = car.engine;
      document.getElementById('hp').textContent = car.hp;
      document.getElementById('accel').textContent = car.accel;
      document.getElementById('trans').textContent = car.trans;

      const img = document.getElementById('carImg');
      const swatches = document.getElementById('colorSwatches');

      // Load first color
      img.src = car.colors[0].img;
      selectedColorIndex = 0;

      // Create swatches
      car.colors.forEach((color, i) => {
        const swatch = document.createElement('div');
        swatch.className = 'color-swatch';
        swatch.style.backgroundColor = color.code;
        swatch.title = color.name;
        if (i === 0) swatch.classList.add('active');
        swatch.onclick = () => {
          document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
          swatch.classList.add('active');
          img.src = color.img;
          selectedColorIndex = i;
        };
        swatches.appendChild(swatch);
      });

      // Reserve button with color
      const reserveBtn = document.getElementById('reserveBtn');
      reserveBtn.addEventListener('click', (e) => {
        e.preventDefault();
        const url = `reserve.html?brand=${brandKey}&model=${modelKey}&color=${selectedColorIndex}`;
        window.location.href = url;
      });

    } else {
      document.querySelector('main').innerHTML = `
        <div style="color:var(--text); text-align:center; margin:100px auto; max-width:600px;">
          <h2>Car Not Found</h2>
          <p>We couldn't find the requested vehicle. Please return to the fleet.</p>
          <a href="fleet.html" class="btn" style="display:inline-block; margin-top:1.5rem;">← Back to Fleet</a>
        </div>
      `;
    }
  </script>
</body>
</html>
